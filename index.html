<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PVR WEB</title>

    <!-- Google Font: Inter (Gen Z Design System) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Light mode base (PVR Gold theme) -->
    <link rel="stylesheet" id="pvr-theme-light" href="./haptikbot-inox.css">

    <!-- Dark mode override — toggled via JS -->
    <link rel="stylesheet" id="pvr-theme-dark" href="./haptikbot-dark.css" disabled>

</head>

<body>

    PVR WEB APP

    <!-- Dark Mode Toggle Button -->
    <button
        id="dark-mode-toggle"
        aria-label="Toggle dark mode"
        data-label="Dark Mode"
        title="Toggle Dark Mode"
    >🌙</button>

    <script>
        /* ── Dark Mode Toggle Logic ─────────────────────────── */
        const toggleBtn    = document.getElementById('dark-mode-toggle');
        const lightSheet   = document.getElementById('pvr-theme-light');
        const darkSheet    = document.getElementById('pvr-theme-dark');
        const STORAGE_KEY  = 'pvr_dark_mode';

        function applyDarkMode(enable) {
            darkSheet.disabled = !enable;
            lightSheet.disabled = enable;
            document.body.classList.toggle('pvr-dark-mode', enable);

            if (enable) {
                toggleBtn.textContent   = '☀️';
                toggleBtn.dataset.label = 'Light Mode';
                localStorage.setItem(STORAGE_KEY, '1');
            } else {
                toggleBtn.textContent   = '🌙';
                toggleBtn.dataset.label = 'Dark Mode';
                localStorage.setItem(STORAGE_KEY, '0');
            }
        }

        // Restore saved preference on load
        const saved = localStorage.getItem(STORAGE_KEY);
        applyDarkMode(saved === '1');

        toggleBtn.addEventListener('click', () => {
            // Compute the next state: dark is enabled when darkSheet.disabled is false
            const nextDark = !darkSheet.disabled;
            localStorage.setItem(STORAGE_KEY, nextDark ? '1' : '0');
            // Debug log and reload so the SDK initializes with the selected CSS
            console.log('theme toggle clicked — nextDark=', nextDark);
            window.location.reload();
        });

        const css = saved === '1' ? './haptikbot-dark.css' : './haptikbot-inox.css';
        /* ── Haptik SDK Init ─────────────────────────────────── */
        var haptikInitSettings = {
            'business-id': '7203',
            'client-id': 'cd4c4077ae7748763331badd8b3dd6da6a5211c3',
            'base-url': 'https://staging.hellohaptik.com/',
            'ignore-storage': false,
            'typography': 'Poppins',
            'primary-color': '#FFBD51',

            // Main CSS file for Haptik widget
            'custom-css': css,
        };

        const urlParams = new URLSearchParams(window.location.search);
        const user_id   = urlParams.get('user_id');

        document.addEventListener('haptik_sdk', () => {

            HaptikSDK.signup(
                {
                    'username':    'username123',
                    'auth_id':     '123sfsdffsdfsd',
                    'auth_code':   '8kBYLkqI7xOQPnsdfdsvfcG4Y5Q==',
                    'mobile_no':   '8300754432',
                    'email':       'santhosh@gmail.com',
                    'signup-type': 'third_party',

                    'custom_data': {
                        "source":        "inox",
                        "current_city":  "Gurugram",
                        "current_lat":   "12.9629",
                        "current_long":  "77.5775",
                        "mobile_no":     "9806355598",
                        "location_time": "2025-04-29T07:25:12.226359+0000",
                        "environment":   "preprod",
                        "platform":      "web"
                    }
                },

                function (status, error, data) {
                    if (status) {
                        console.log('CUSTOM SIGN UP SUCCESSFUL');
                        HaptikSDK.launchMessage("Main Menu", callbackFunction, true);
                    } else {
                        console.log('ERROR', error);
                    }
                }
            );
        });

        function callbackFunction() {
            console.log("Call Back Function Called");
        }
    </script>

    <script
        type="text/javascript"
        charset="UTF-8"
        src="https://toolassets.haptikapi.com/platform/javascript-xdk/production/loader.js">
    </script>

</body>
</html>
